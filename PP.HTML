<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Game Center</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
}

.topbar {
    background: linear-gradient(90deg, #00ffcc, #6a00ff);
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: 220px 1fr 420px;
    height: calc(100vh - 70px);
}

.sidebar {
    background: #0a0a0a;
    padding: 20px;
    border-right: 2px solid #00ffcc;
}

.main {
    padding: 20px;
    text-align: center;
}

.display {
    background: #050505;
    padding: 15px;
    overflow: auto;
}

input, select {
    padding: 10px;
    margin: 8px;
    border-radius: 6px;
    border: none;
}

input {
    background: #111;
    color: #00ffcc;
}

select {
    background: #111;
    color: white;
    border: 1px solid #6a00ff;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: linear-gradient(90deg, #00ffcc, #6a00ff);
    color: black;
    font-weight: bold;
}

.grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(3,1fr);
}

.box {
    background: #000;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    font-size: 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 120px;
    border-radius: 8px;
}

.expired {
    color: red;
    border-color: red;
}
</style>
</head>

<body>

<div class="topbar">
    🎮 GAME CENTER SYSTEM
</div>

<div class="container">

    <!-- 🔹 ซ้าย -->
    <div class="sidebar">
        <h3>ตั้งค่าเวลา</h3>

        <!-- เลือกเวลา -->
        <select id="timeSelect">
            <option value="3600">1 ชม</option>
            <option value="7200">2 ชม</option>
            <option value="18000">5 ชม</option>
            <option value="72000">20 ชม</option>
        </select>

        <br>

        <!-- 🔥 เลือกบัตร -->
        <select id="cardSelect"></select>

        <br>

        <!-- 🔥 เพิ่มเวลา -->
        <button onclick="addTimeToSelected()">➕ เพิ่มเวลา</button>
    </div>

    <!-- 🔹 กลาง -->
    <div class="main">
        <h2>กรอกเลขบัตร</h2>

        <input type="text" id="card"
        placeholder="เลขบัตร"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')">

        <br>

        <button onclick="addCard()">เพิ่ม</button>
        <button onclick="clearAll()">ล้าง</button>
    </div>

    <!-- 🔹 ขวา -->
    <div class="display">
        <div id="grid" class="grid"></div>
    </div>

</div>

<script>
let cards = [];

// ➕ เพิ่มบัตร
function addCard(){
    let val = document.getElementById("card").value;
    let time = parseInt(document.getElementById("timeSelect").value);

    if(val === "") return alert("ใส่เลขก่อน");

    cards.unshift({
        id: val,
        time: time
    });

    document.getElementById("card").value = "";

    updateCardSelect();
    renderDisplay();
}

// 🔄 อัปเดตรายชื่อบัตร
function updateCardSelect(){
    let select = document.getElementById("cardSelect");
    select.innerHTML = "";

    cards.forEach((c, i)=>{
        let opt = document.createElement("option");
        opt.value = i;
        opt.text = "บัตร " + c.id;
        select.appendChild(opt);
    });
}

// ➕ เพิ่มเวลาให้บัตรที่เลือก
function addTimeToSelected(){
    let index = document.getElementById("cardSelect").value;

    if(index === "" || cards.length === 0){
        alert("เลือกบัตรก่อน");
        return;
    }

    let time = parseInt(document.getElementById("timeSelect").value);
    cards[index].time += time;

    renderDisplay();
}

// 🧹 ล้าง
function clearAll(){
    cards = [];
    updateCardSelect();
    renderDisplay();
}

// ⏱️ format เวลา
function formatTime(sec){
    let h = Math.floor(sec/3600);
    let m = Math.floor((sec%3600)/60);
    let s = sec%60;
    return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// 📺 แสดงผล
function renderDisplay(){
    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    cards.forEach((c)=>{
        let div = document.createElement("div");
        div.className = "box";

        if(c.time <= 0){
            div.classList.add("expired");
        }

        div.innerHTML = `
            <div>🎫 ${c.id}</div>
            <div>${formatTime(c.time)}</div>
        `;

        grid.appendChild(div);
    });
}

// ⌛ นับถอยหลัง
setInterval(()=>{
    cards.forEach(c=>{
        if(c.time > 0) c.time--;
    });
    renderDisplay();
},1000);

updateCardSelect();
renderDisplay();
</script>

</body>
</html>
